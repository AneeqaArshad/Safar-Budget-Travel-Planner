<!DOCTYPE html>
<html lang="en">

<head>
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Safar — Login</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com"
/>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
/>

<link
href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap"
rel="stylesheet"
/>

<link
rel="stylesheet"
href="/static/css/auth.css"
/>

</head>

<body>

<div class="auth-layout">

  <div class="auth-hero">

    <div class="auth-logo">
      Safar
    </div>

    <div class="auth-tagline">

      AI-powered travel planning
      designed around your
      budget, preferences,
      and travel style.

    </div>

    <div class="auth-sub">

      Intelligent itineraries.<br>
      Explainable recommendations.<br>
      Beautiful travel experiences.

    </div>

  </div>

  <div class="auth-card">

    <h1 class="auth-title">
      Welcome back
    </h1>

    <p class="auth-desc">

      Login to continue planning
      your next journey.

    </p>

    <form
      id="loginForm"
      class="auth-form"
    >

      <input
        type="email"
        id="email"
        class="auth-input"
        placeholder="Email"
        required
      >
      <div class="password-wrapper">
        <input
                type="password"
                id="password"
                class="auth-input"
                placeholder="Password"
                required
            >

            <button
                type="button"
                id="togglePassword"
            >
              <i class="fa-regular fa-eye"></i>
            </button>
      </div>
      <div class="remember-wrap">
        <label class="remember-label">
            <input
            type="checkbox"
            id="rememberMe">
            <span>Remember me</span>
        </label>
    </div>

      <button
        type="submit"
        class="auth-btn"
      >
        Login
      </button>

    </form>

    <div class="auth-switch">

      Don’t have an account?

      <a href="/signup">
        Create one
      </a>

    </div>

  </div>

</div>

<script src="/static/js/login.js"></script>

</body>
</html>
