<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Safar — Signup</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com"
/>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
/>

<link
href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap"
rel="stylesheet"
/>

<link
rel="stylesheet"
href="/static/css/auth.css"
/>

</head>

<body>

<div class="auth-layout">

  <div class="auth-hero">

    <div class="auth-logo">
      Safar
    </div>

    <div class="auth-tagline">

      Personalized travel planning
      powered by AI intelligence
      and budget-aware decision making.

    </div>

    <div class="auth-sub">

      Discover smarter journeys.<br>
      Save time and money.<br>
      Travel beautifully.

    </div>

  </div>

  <div class="auth-card">

    <h1 class="auth-title">
      Create account
    </h1>

    <p class="auth-desc">

      Start building your intelligent
      travel experiences.

    </p>

    <form
      id="signupForm"
      class="auth-form"
    >

      <input
        type="text"
        id="username"
        class="auth-input"
        placeholder="Username"
        required
      >

      <input
        type="email"
        id="email"
        class="auth-input"
        placeholder="Email"
        required
      >
      <div class="password-wrapper">
          <input
              type="password"
              id="password"
              class="auth-input"
              placeholder="Password"
              required
          >

          <button
              type="button"
              id="togglePassword"
          >
              👁
          </button>
      </div>

      <button
        type="submit"
        class="auth-btn"
      >
        Create Account
      </button>

    </form>

    <div class="auth-switch">

      Already have an account?

      <a href="/login">
        Login
      </a>

    </div>

  </div>

</div>

<script src="/static/js/signup.js"></script>

</body>
</html>
